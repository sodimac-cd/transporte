<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Devolución Vacíos — CD Lo Espejo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#2563eb;--blue-dark:#1d4ed8;--green:#16a34a;--red:#dc2626;--border:#e2e8f0;--bg:#f1f5f9;--text:#1e293b;--muted:#64748b;--white:#fff}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--blue);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px}
.header-icon{width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:10px;display:flex;align-items:center;justify-content:center}
.header h1{font-size:16px;font-weight:700}
.header p{font-size:12px;opacity:.7;margin-top:1px}
.content{padding:16px}
.card{background:var(--white);border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.section-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:5px;color:var(--text)}
.req{color:var(--red)}
.form-group input,.form-group select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:'Inter',sans-serif;background:var(--white);color:var(--text);outline:none;-webkit-appearance:none;appearance:none}
.form-group input:focus,.form-group select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── Zona de foto EIR ── */
.eir-upload{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;background:#fafbfc;position:relative}
.eir-upload:hover,.eir-upload.drag{border-color:var(--blue);background:#eff6ff}
.eir-upload.has-img{border-style:solid;border-color:#86efac;background:#f0fdf4;padding:8px}
.eir-upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.eir-icon{font-size:32px;margin-bottom:8px}
.eir-label{font-size:13px;font-weight:500;color:var(--muted)}
.eir-sublabel{font-size:11px;color:#94a3b8;margin-top:4px}
.eir-preview{width:100%;max-height:200px;object-fit:contain;border-radius:8px;display:none}
.eir-preview.show{display:block}
.eir-filename{font-size:12px;color:var(--green);font-weight:500;margin-top:6px;display:none}
.eir-filename.show{display:block}
.btn-cambiar{font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;text-decoration:underline;margin-top:4px}

.btn-submit{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;margin-top:8px}
.btn-submit:hover{background:var(--blue-dark)}
.btn-submit:disabled{opacity:.6}
.loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:500;opacity:0;transition:all .3s;z-index:999;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--red)}
.toast.success{background:var(--green)}
.success-screen{display:none;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;min-height:60vh}
.success-screen.show{display:flex}
.success-icon{width:72px;height:72px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:32px}
.success-screen h2{font-size:20px;font-weight:700;color:var(--green);margin-bottom:8px}
.success-screen p{font-size:14px;color:var(--muted);margin-bottom:16px;max-width:280px}
.success-detail{font-size:12px;color:#475569;background:#f8fafc;border-radius:8px;padding:12px 16px;margin-bottom:20px;text-align:left;width:100%;max-width:320px;border:1px solid var(--border)}
.success-detail span{display:block;margin-bottom:4px}
.success-eir-thumb{width:100%;max-width:200px;border-radius:8px;margin-bottom:16px;border:1px solid #86efac}
.btn-new{padding:12px 28px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.field-error{border-color:var(--red)!important;box-shadow:0 0 0 3px rgba(220,38,38,.1)!important}
.upload-progress{height:4px;background:#e2e8f0;border-radius:4px;margin-top:8px;overflow:hidden;display:none}
.upload-progress.show{display:block}
.upload-bar{height:100%;background:var(--blue);border-radius:4px;transition:width .3s;width:0%}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="2" y="7" width="20" height="14" rx="2" stroke="#fff" stroke-width="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16" stroke="#fff" stroke-width="2"/></svg>
  </div>
  <div>
    <h1>Devolución Vacíos</h1>
    <p>CD Lo Espejo — Nueva Devolución Naviera</p>
  </div>
</div>

<div id="form-content" class="content">

  <div class="card">
    <div class="section-title">Datos de Devolución</div>
    <div class="form-row">
      <div class="form-group">
        <label>Fecha devolución <span class="req">*</span></label>
        <input type="date" id="d-fecha">
      </div>
      <div class="form-group">
        <label>Depósito <span class="req">*</span></label>
        <select id="d-deposito">
          <option value="">Depósito...</option>
          <option>SITRANS SAN ANTONIO</option>
          <option>CIS SAN ANTONIO</option>
          <option>HGT SAN ANTONIO</option>
          <option>MEDLOG VALPARAISO</option>
          <option>MEDLOG SAN ANTONIO</option>
          <option>SITRANS VALPARAISO</option>
          <option>HGT VALPARAISO</option>
          <option>SITRANS SANTIAGO</option>
          <option>HGT SANTIAGO</option>
          <option>DEPOSITO CD</option>
          <option>TERCOP</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Transportista <span class="req">*</span></label>
      <select id="d-transporte">
        <option value="">Seleccionar transporte...</option>
        <option>85.131.900-K CASABLANCA</option>
        <option>76.651.987-3 FR RENTAL</option>
        <option>76107615-9 BYD</option>
        <option>76.840.809-2 JUC CHILE</option>
        <option>76.421.758-6 SERMOV</option>
        <option>96.979.980-4 SAN FABIAN</option>
        <option>76.501.883-8 CASTELLINI</option>
        <option>77.082.997-6 CF</option>
        <option>77.248.307-4 GLOBAL LOGISTIC</option>
        <option>77.079.719-5 H. BUSTOS</option>
        <option>77.304.186-5 CELMAR</option>
        <option>96.500.950-7 SITRANS</option>
        <option>77.090.481-1 PRECAM</option>
        <option>76.228.166-K TRANVIAL</option>
        <option>76.388.144-K MOVEONTRUCK</option>
        <option>76.172.595-5 MEDLOG</option>
        <option>76.381.392-4 JULIO HIDALGO</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>N° Contenedor <span class="req">*</span></label>
        <input type="text" id="d-contenedor" placeholder="XXXX1234567" style="text-transform:uppercase">
      </div>
      <div class="form-group">
        <label>N° EIR <span class="req">*</span></label>
        <input type="text" id="d-eir" placeholder="Ej: 123456">
      </div>
    </div>
    <div class="form-group">
      <label>Naviera</label>
      <select id="d-naviera">
        <option value="">Seleccionar naviera...</option>
        <option>MAERSK</option>
        <option>MSC</option>
        <option>CMA CGM</option>
        <option>HAPAG-LLOYD</option>
        <option>COSCO</option>
        <option>EVERGREEN</option>
        <option>ONE</option>
        <option>YANG MING</option>
        <option>ZIM</option>
        <option>OTRA</option>
      </select>
    </div>
  </div>

  <!-- ✅ NUEVO: Subida de foto del EIR -->
  <div class="card">
    <div class="section-title">Foto EIR <span class="req">*</span></div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px">Saca foto o sube imagen del Equiment Interchange Receipt firmado</p>
    <div class="eir-upload" id="eir-drop" onclick="document.getElementById('eir-file').click()">
      <input type="file" id="eir-file" accept="image/*" capture="environment" onchange="handleFile(this)">
      <div id="eir-placeholder">
        <div class="eir-icon">📄</div>
        <div class="eir-label">Toca aquí para fotografiar o subir el EIR</div>
        <div class="eir-sublabel">JPG, PNG — máx. 5 MB</div>
      </div>
      <img id="eir-preview" class="eir-preview" alt="Vista previa EIR">
      <div id="eir-filename" class="eir-filename"></div>
    </div>
    <div class="upload-progress" id="upload-progress"><div class="upload-bar" id="upload-bar"></div></div>
    <button class="btn-cambiar" id="btn-cambiar" style="display:none" onclick="resetFoto(event)">✕ Cambiar foto</button>
  </div>

  <button class="btn-submit" onclick="guardar()" id="btn-guardar">Guardar Devolución</button>
</div>

<div id="success-screen" class="success-screen">
  <div class="success-icon">✓</div>
  <h2>¡Devolución Registrada!</h2>
  <p>Datos guardados correctamente en Google Sheets.</p>
  <img id="success-thumb" class="success-eir-thumb" style="display:none" alt="EIR registrado">
  <div class="success-detail" id="success-detail"></div>
  <button class="btn-new" onclick="nueva()">Nueva Devolución</button>
</div>

<div id="toast" class="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwAcA060GAWPjTHD-WY4G93GW3vRFWftbkq51Ocfz8r6nwyCxq3Nz1MefScnpDA7iXV/exec';

let eirBase64 = '';
let eirMime = '';

document.getElementById('d-fecha').value = new Date().toISOString().split('T')[0];

// ── Manejo de foto ──
function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    toast('La imagen es muy grande. Máximo 5 MB.', 'error');
    return;
  }
  eirMime = file.type;

  // Barra de progreso simulada
  const prog = document.getElementById('upload-progress');
  const bar = document.getElementById('upload-bar');
  prog.classList.add('show');
  let pct = 0;
  const iv = setInterval(() => {
    pct += 15;
    bar.style.width = Math.min(pct, 90) + '%';
    if (pct >= 90) clearInterval(iv);
  }, 80);

  const reader = new FileReader();
  reader.onload = function(e) {
    clearInterval(iv);
    bar.style.width = '100%';
    setTimeout(() => prog.classList.remove('show'), 400);

    eirBase64 = e.target.result.split(',')[1]; // solo base64 sin prefijo
    const preview = document.getElementById('eir-preview');
    preview.src = e.target.result;
    preview.classList.add('show');
    document.getElementById('eir-placeholder').style.display = 'none';
    document.getElementById('eir-filename').textContent = '✓ ' + file.name;
    document.getElementById('eir-filename').classList.add('show');
    document.getElementById('eir-drop').classList.add('has-img');
    document.getElementById('eir-drop').style.pointerEvents = 'none';
    document.getElementById('btn-cambiar').style.display = 'inline-block';
  };
  reader.readAsDataURL(file);
}

function resetFoto(e) {
  e.stopPropagation();
  eirBase64 = '';
  eirMime = '';
  const preview = document.getElementById('eir-preview');
  preview.src = '';
  preview.classList.remove('show');
  document.getElementById('eir-placeholder').style.display = 'block';
  document.getElementById('eir-filename').classList.remove('show');
  document.getElementById('eir-drop').classList.remove('has-img');
  document.getElementById('eir-drop').style.pointerEvents = 'auto';
  document.getElementById('btn-cambiar').style.display = 'none';
  document.getElementById('eir-file').value = '';
}

function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3500);
}

function markError(id) {
  const el = document.getElementById(id);
  el.classList.add('field-error');
  el.addEventListener('change', () => el.classList.remove('field-error'), {once:true});
  el.addEventListener('input', () => el.classList.remove('field-error'), {once:true});
}

async function guardar() {
  const btn = document.getElementById('btn-guardar');
  const vals = {
    tipo_registro: 'DEVOLUCION_VACIO',
    fecha: document.getElementById('d-fecha').value,
    deposito: document.getElementById('d-deposito').value,
    transporte: document.getElementById('d-transporte').value,
    contenedor: document.getElementById('d-contenedor').value.trim().toUpperCase(),
    eir: document.getElementById('d-eir').value.trim(),
    naviera: document.getElementById('d-naviera').value,
  };

  // Validación
  let hasError = false;
  [['d-fecha','fecha'],['d-deposito','deposito'],['d-transporte','transporte'],
   ['d-contenedor','contenedor'],['d-eir','eir']].forEach(([id, key]) => {
    if (!vals[key]) { markError(id); hasError = true; }
  });
  if (!eirBase64) {
    document.getElementById('eir-drop').style.borderColor = 'var(--red)';
    hasError = true;
  }
  if (hasError) { toast('Completa todos los campos obligatorios *', 'error'); return; }

  btn.innerHTML = '<span class="loading"></span> Guardando...';
  btn.disabled = true;

  const payload = {
    ...vals,
    eir_imagen: eirBase64,  // base64 de la foto
    eir_mime: eirMime,
    timestamp: new Date().toISOString(),
  };

  try {
    // GET con params básicos (sin imagen, para registro rápido)
    const params = new URLSearchParams({...vals, ts: Date.now()});
    fetch(API + '?' + params, {method:'GET'}).catch(() => {});

    // POST con imagen en base64
    await fetch(API, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify(payload)
    });

    // Pantalla de éxito
    document.getElementById('success-detail').innerHTML =
      `<span>📅 <b>Fecha:</b> ${vals.fecha}</span>` +
      `<span>🏢 <b>Depósito:</b> ${vals.deposito}</span>` +
      `<span>🚛 <b>Transportista:</b> ${vals.transporte}</span>` +
      `<span>📦 <b>Contenedor:</b> ${vals.contenedor}</span>` +
      `<span>📋 <b>EIR N°:</b> ${vals.eir}</span>` +
      (vals.naviera ? `<span>🚢 <b>Naviera:</b> ${vals.naviera}</span>` : '');

    // Mostrar thumb del EIR en éxito
    const thumb = document.getElementById('success-thumb');
    if (eirBase64) {
      thumb.src = 'data:' + eirMime + ';base64,' + eirBase64;
      thumb.style.display = 'block';
    }

    document.getElementById('form-content').style.display = 'none';
    document.getElementById('success-screen').classList.add('show');
  } catch(e) {
    toast('Error de conexión. Verifica tu internet e intenta nuevamente.', 'error');
    btn.innerHTML = 'Guardar Devolución';
    btn.disabled = false;
  }
}

function nueva() {
  document.getElementById('success-screen').classList.remove('show');
  document.getElementById('form-content').style.display = 'block';
  document.querySelectorAll('input[type=text]').forEach(i => i.value = '');
  document.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
  document.getElementById('d-fecha').value = new Date().toISOString().split('T')[0];
  document.getElementById('btn-guardar').innerHTML = 'Guardar Devolución';
  document.getElementById('btn-guardar').disabled = false;
  document.getElementById('success-thumb').style.display = 'none';
  resetFoto({stopPropagation: () => {}});
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
